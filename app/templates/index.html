<!DOCTYPE html>
<html>
<head>
    <title>DSA Revision Scheduler</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>

    <h1>DSA Revision Scheduler</h1>

    <div class="dashboard">

        <div class="card">
            <h3>Total Problems</h3>
            <p id="total-problems">0</p>
        </div>

        <div class="card">
            <h3>Pending Revisions</h3>
            <p id="pending-revisions">0</p>
        </div>

    </div>
    <h2>Add Problem</h2>

<form id="problem-form">

    <input
        type="text"
        id="title"
        placeholder="Problem Title"
        required
    >

    <input
        type="text"
        id="topic"
        placeholder="Topic"
        required
    >

    <input
        type="text"
        id="difficulty"
        placeholder="Difficulty"
        required
    >

    <button type="submit">
        Add Problem
    </button>

</form>
<h2>Problems</h2>

<table border="1" id="problems-table">

    <thead>
        <tr>
            <th>ID</th>
            <th>Title</th>
            <th>Topic</th>
            <th>Difficulty</th>
            <th>Solved Date</th>
        </tr>
    </thead>

    <tbody>

    </tbody>

</table>
<h2>Upcoming Revisions</h2>

<table border="1" id="revisions-table">

    <thead>
        <tr>
            <th>Title</th>
            <th>Topic</th>
            <th>Difficulty</th>
            <th>Revision Date</th>
        </tr>
    </thead>

    <tbody>

    </tbody>

</table>

    <script src="/static/script.js"></script>

</body>
</html>
